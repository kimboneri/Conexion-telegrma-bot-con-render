services:
  - type: web
    name: telegram-bot-sneakers
    runtime: node
    repo: https://github.com/TU_USUARIO/TU_REPO
    plan: free
    branch: main
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
